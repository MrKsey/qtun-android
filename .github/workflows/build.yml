name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        target: armv7-linux-androideabi,aarch64-linux-android

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11.0

    - name: Install NDK and build tools
      run: |
        sdkmanager --install "ndk;27.2.12479018" "build-tools;35.0.0" "platforms;android-35"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload ARM APK
      uses: actions/upload-artifact@v4
      with:
        name: qtun-android-arm-debug
        path: app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk
        if-no-files-found: warn

    - name: Upload ARM64 APK
      uses: actions/upload-artifact@v4
      with:
        name: qtun-android-arm64-debug
        path: app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
        if-no-files-found: warn

    - name: Upload Universal APK
      uses: actions/upload-artifact@v4
      with:
        name: qtun-android-universal-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
