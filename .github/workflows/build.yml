name: Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Fix Rust unused import warning
      run: |
        sed -i 's/use std::io::{Read, Write};/use std::io::Read;/' app/src/main/rust/qtun/src/protect.rs

    - name: Remove x86 from build targets
      run: |
        sed -i 's/targets = listOf("arm", "arm64", "x86", "x86_64")/targets = listOf("arm", "arm64")/' app/build.gradle.kts
        sed -i 's/isUniversalApk = true/isUniversalApk = true\n            include("armeabi-v7a", "arm64-v8a")/' app/build.gradle.kts

    - name: Configure signing for release
      run: |
        cat >> app/build.gradle.kts << 'EOF'

        android.signingConfigs {
            create("release") {
                storeFile = file("/home/runner/.android/debug.keystore")
                storePassword = "android"
                keyAlias = "androiddebugkey"
                keyPassword = "android"
            }
        }

        android.buildTypes.release.signingConfig = android.signingConfigs.getByName("release")
        EOF

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        target: armv7-linux-androideabi,aarch64-linux-android

    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Fix Android config directory permissions
      run: |
        mkdir -p /home/runner/.android
        chmod 777 /home/runner/.android

    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore /home/runner/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Install NDK
      run: |
        sudo $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.2.12479018"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Release APK (ARM only)
      run: ./gradlew assembleRelease --stacktrace -PabiFilters=armeabi-v7a,arm64-v8a

    - name: Upload ARM APK
      uses: actions/upload-artifact@v4
      with:
        name: qtun-android-arm-release
        path: app/build/outputs/apk/release/app-armeabi-v7a-release.apk
        if-no-files-found: warn

    - name: Upload ARM64 APK
      uses: actions/upload-artifact@v4
      with:
        name: qtun-android-arm64-release
        path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
        if-no-files-found: warn

    - name: Upload Universal APK
      uses: actions/upload-artifact@v4
      with:
        name: qtun-android-universal-release
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    steps:
    - name: Download ARM APK
      uses: actions/download-artifact@v4
      with:
        name: qtun-android-arm-release
        path: ./artifacts

    - name: Download ARM64 APK
      uses: actions/download-artifact@v4
      with:
        name: qtun-android-arm64-release
        path: ./artifacts

    - name: Download Universal APK
      uses: actions/download-artifact@v4
      with:
        name: qtun-android-universal-release
        path: ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./artifacts/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
